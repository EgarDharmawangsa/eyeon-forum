<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyeOnForum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chatroom">
        <h2>Eyeon<span style="color: #28d56a"> Forum</span></h2>
        <div class="greeting-message-bubble">Selamat datang di EyeonForum! Yuk, ngobrol dan tukar pikiran di sini 😊</div>
        <div class="chat" id="chat"></div>
        <div class="input-group">
            <input type="text" class="input" id="message" placeholder="Ketik pesan...">
            <button id="sendBtn" class="button">Kirim</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
